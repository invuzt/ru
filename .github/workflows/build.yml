name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          gradle assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk cak.ru.apk
          ls -lh cak.ru.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cak-ru-apk
          path: cak.ru.apk
