name: Build Ultra Minimal APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/30.0.3" >> $GITHUB_PATH
          
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

      - name: Build APK
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          
          # Hapus referensi icon dari manifest (biar gak pusing)
          cat > AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.cak.ru">
              <application android:label="Cak Ru">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          # Compile Java
          mkdir -p build/classes
          javac -source 1.7 -target 1.7 -bootclasspath "$ANDROID_HOME/platforms/android-30/android.jar" \
            -d build/classes MainActivity.java 2>/dev/null || \
          cat > MainActivity.java << 'JAVA'
          package com.cak.ru;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              public void onCreate(Bundle b) {
                  super.onCreate(b);
                  TextView tv = new TextView(this);
                  tv.setText("Hello World");
                  setContentView(tv);
              }
          }
          JAVA
          
          javac -source 1.7 -target 1.7 -bootclasspath "$ANDROID_HOME/platforms/android-30/android.jar" \
            -d build/classes MainActivity.java
          
          # Convert ke dex
          $ANDROID_HOME/build-tools/30.0.3/dx --dex --output=build/classes.dex build/classes
          
          # Package APK tanpa icon (biar gak ribet)
          $ANDROID_HOME/build-tools/30.0.3/aapt package -f \
            -M AndroidManifest.xml \
            -I "$ANDROID_HOME/platforms/android-30/android.jar" \
            -F build/unaligned.apk build/classes.dex
          
          # Align
          $ANDROID_HOME/build-tools/30.0.3/zipalign -f -p 4 build/unaligned.apk build/aligned.apk
          
          # Sign
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" \
            -storepass android -keypass android -noprompt
          
          $ANDROID_HOME/build-tools/30.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug build/aligned.apk
          
          cp build/aligned.apk cak.ru.minimal.apk
          echo "✅ APK size:"
          ls -lh cak.ru.minimal.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minimal-apk
          path: cak.ru.minimal.apk
