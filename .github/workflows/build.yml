name: Build Ultra Minimal APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17 (for SDK tools)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/30.0.3" >> $GITHUB_PATH
          
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

      - name: Build APK with dx (using Java 8 for javac)
        run: |
          export ANDROID_HOME=$PWD/android-sdk
          
          # Cari Java 8 untuk kompilasi (bytecode lebih kecil)
          JAVA8_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          if [ ! -f "$JAVA8_HOME/bin/javac" ]; then
            # Install Java 8 if not found
            sudo apt-get update -qq && sudo apt-get install -y -qq openjdk-8-jdk
            JAVA8_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          fi
          
          # Compile dengan Java 8 (target 1.7 for smaller dex)
          mkdir -p build/classes
          $JAVA8_HOME/bin/javac -source 1.7 -target 1.7 \
            -bootclasspath "$ANDROID_HOME/platforms/android-30/android.jar" \
            -d build/classes app/src/main/java/com/cak/ru/MainActivity.java
          
          # Convert ke dex dengan --no-locals
          $ANDROID_HOME/build-tools/30.0.3/dx --dex --no-locals --output=build/classes.dex build/classes
          
          # Buat APK kosong
          $ANDROID_HOME/build-tools/30.0.3/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -I "$ANDROID_HOME/platforms/android-30/android.jar" \
            -F build/unaligned.apk
          
          # Tambah classes.dex
          $ANDROID_HOME/build-tools/30.0.3/aapt add build/unaligned.apk build/classes.dex
          
          # Tambah icon
          $ANDROID_HOME/build-tools/30.0.3/aapt add build/unaligned.apk app/src/main/res/drawable/ic_launcher.png
          
          # Align & Sign
          $ANDROID_HOME/build-tools/30.0.3/zipalign -f -p 4 build/unaligned.apk build/aligned.apk
          
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" \
            -storepass android -keypass android -noprompt
          
          $ANDROID_HOME/build-tools/30.0.3/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug build/aligned.apk
          
          cp build/aligned.apk cak.ru.ultra-minimal.apk
          echo "Final APK size:"
          ls -lh cak.ru.ultra-minimal.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ultra-minimal-apk
          path: cak.ru.ultra-minimal.apk
